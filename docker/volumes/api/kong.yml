_format_version: "2.1"
_transform: true

# NOTE: These consumer keys are the public demo Supabase JWTs shipped in
# docker/.env.example. If you rotate ANON_KEY / SERVICE_ROLE_KEY in .env,
# also update them here and rebuild the kong container. The values are
# intentionally literal (no env substitution) — Kong's declarative config
# format doesn't interpolate env vars reliably in the base image.
consumers:
  - username: anon
    keyauth_credentials:
      - key: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlLWRlbW8iLCJpYXQiOjE3NjcyMjU2MDAsImV4cCI6MjA4MjY3MjAwMH0.xheE2-fAwI0V1voEqWqmAF7x129taRCETrSANVAyjWs
  - username: service_role
    keyauth_credentials:
      - key: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoic2VydmljZV9yb2xlIiwiaXNzIjoic3VwYWJhc2UtZGVtbyIsImlhdCI6MTc2NzIyNTYwMCwiZXhwIjoyMDgyNjcyMDAwfQ.tfcmS_54IHEB-ExNyjhCR96hXTpOXGK-K0oM5undYWk

acls:
  - consumer: anon
    group: anon
  - consumer: service_role
    group: admin

services:
  - name: auth-v1
    url: http://auth:9999/
    routes:
      - name: auth-v1-all
        strip_path: true
        paths:
          - /auth/v1/
    plugins:
      - name: cors

  - name: rest-v1
    url: http://rest:3000/
    routes:
      - name: rest-v1-all
        strip_path: true
        paths:
          - /rest/v1/
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: false
      - name: acl
        config:
          hide_groups_header: true
          allow:
            - admin
            - anon
